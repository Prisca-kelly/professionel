{% load static %}
<!-- Navbar -->
<nav x-data="navbar()" 
     @scroll.window="scrolled = window.scrollY > 50" 
     class="sticky top-0 z-40 transition-all duration-300"
     :class="scrolled ? 'bg-white shadow-lg' : 'bg-white bg-opacity-95'"
>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <img src="{% static 'public/images/images.jpg' %}" alt="MEPG Logo" class="w-16 h-12 object-contain">
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="#accueil" class="nav-link text-gray-700 hover:text-green-700 font-medium transition-all duration-300">Accueil</a>
                <a href="#ministere" class="nav-link text-gray-700 hover:text-green-700 font-medium transition-all duration-300">Ministère</a>
                <a href="#ministre" class="nav-link text-gray-700 hover:text-green-700 font-medium transition-all duration-300">Le Ministre</a>
                <!-- Provinces dropdown -->
                <div class="relative" @click.outside="provincesOpen = false; resetSelection()">
                    <button
                        type="button"
                        class="nav-link text-gray-700 hover:text-green-700 font-medium transition-all duration-300 inline-flex items-center gap-2"
                        @click="provincesOpen = !provincesOpen"
                        :aria-expanded="provincesOpen.toString()"
                    >
                        Provinces
                        <svg class="w-4 h-4 transition-transform duration-200" :class="provincesOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>

                    <div
                        x-show="provincesOpen"
                        x-transition:enter="transition ease-out duration-300"
                        x-transition:enter-start="opacity-0 transform scale-95 -translate-y-2"
                        x-transition:enter-end="opacity-100 transform scale-100 translate-y-0"
                        x-transition:leave="transition ease-in duration-200"
                        x-transition:leave-start="opacity-100 transform scale-100 translate-y-0"
                        x-transition:leave-end="opacity-0 transform scale-95 -translate-y-2"
                        class="absolute left-0 mt-3 w-[800px] max-w-[85vw] bg-white/95 backdrop-blur-xl border border-gray-200/50 rounded-2xl shadow-2xl overflow-hidden"
                        style="backdrop-filter: blur(20px);"
                    >
                        <!-- Header with gradient -->
                        <div class="bg-gradient-to-r from-green-600 via-blue-600 to-purple-600 p-4 text-white">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-3">
                                    <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"></path>
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-lg">Explorer les Provinces</h3>
                                        <p class="text-sm text-white/80">Découvrez nos centres de formation</p>
                                    </div>
                                </div>
                                <button 
                                    @click="provincesOpen = false; resetSelection()"
                                    class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center hover:bg-white/30 transition-all duration-200"
                                >
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 min-h-[400px]">
                            <!-- Provinces -->
                            <div class="p-6 border-r border-gray-100/50 bg-gradient-to-b from-gray-50 to-white">
                                <div class="flex items-center mb-4">
                                    <div class="w-6 h-6 bg-green-100 rounded-lg flex items-center justify-center mr-2">
                                        <svg class="w-4 h-4 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                        </svg>
                                    </div>
                                    <p class="text-sm font-bold text-gray-700 uppercase tracking-wider">Provinces</p>
                                </div>
                                <div class="space-y-2 max-h-[300px] overflow-y-auto custom-scrollbar">
                                    <template x-for="p in provinces" :key="p.name">
                                        <button
                                            type="button"
                                            class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 group relative overflow-hidden"
                                            :class="selectedProvince === p.name ? 'bg-gradient-to-r from-green-500 to-green-600 text-white shadow-lg transform scale-105' : 'hover:bg-gradient-to-r hover:from-green-50 hover:to-green-100 text-gray-700 hover:shadow-md'"
                                            @click="selectProvince(p.name)"
                                        >
                                            <div class="flex items-center">
                                                <div class="w-2 h-2 rounded-full mr-3" 
                                                     :class="selectedProvince === p.name ? 'bg-white' : 'bg-green-400'"></div>
                                                <span x-text="p.name" class="font-medium"></span>
                                            </div>
                                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-600"></div>
                                        </button>
                                    </template>
                                </div>
                            </div>

                            <!-- Villes -->
                            <div class="p-6 border-r border-gray-100/50 bg-gradient-to-b from-blue-50 to-white">
                                <div class="flex items-center mb-4">
                                    <div class="w-6 h-6 bg-blue-100 rounded-lg flex items-center justify-center mr-2">
                                        <svg class="w-4 h-4 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                                        </svg>
                                    </div>
                                    <p class="text-sm font-bold text-gray-700 uppercase tracking-wider">Villes</p>
                                </div>
                                <template x-if="!selectedProvince">
                                    <div class="text-center py-12">
                                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <svg class="w-8 h-8 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                            </svg>
                                        </div>
                                        <p class="text-sm text-gray-500 font-medium">Sélectionnez une province</p>
                                        <p class="text-xs text-gray-400 mt-1">pour voir les villes disponibles</p>
                                    </div>
                                </template>
                                <div x-show="selectedProvince" class="space-y-2 max-h-[300px] overflow-y-auto custom-scrollbar">
                                    <template x-for="c in cities" :key="c.name">
                                        <button
                                            type="button"
                                            class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 group relative overflow-hidden"
                                            :class="selectedCity === c.name ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg transform scale-105' : 'hover:bg-gradient-to-r hover:from-blue-50 hover:to-blue-100 text-gray-700 hover:shadow-md'"
                                            @click="selectCity(c.name)"
                                        >
                                            <div class="flex items-center">
                                                <div class="w-2 h-2 rounded-full mr-3" 
                                                     :class="selectedCity === c.name ? 'bg-white' : 'bg-blue-400'"></div>
                                                <span x-text="c.name" class="font-medium"></span>
                                            </div>
                                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-600"></div>
                                        </button>
                                    </template>
                                </div>
                            </div>

                            <!-- Centres -->
                            <div class="p-6 bg-gradient-to-b from-purple-50 to-white">
                                <div class="flex items-center mb-4">
                                    <div class="w-6 h-6 bg-purple-100 rounded-lg flex items-center justify-center mr-2">
                                        <svg class="w-4 h-4 text-purple-600" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path>
                                        </svg>
                                    </div>
                                    <p class="text-sm font-bold text-gray-700 uppercase tracking-wider">Centres</p>
                                </div>
                                <template x-if="!selectedCity">
                                    <div class="text-center py-12">
                                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <svg class="w-8 h-8 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"></path>
                                            </svg>
                                        </div>
                                        <p class="text-sm text-gray-500 font-medium">Sélectionnez une ville</p>
                                        <p class="text-xs text-gray-400 mt-1">pour voir les centres de formation</p>
                                    </div>
                                </template>
                                <div x-show="selectedCity" class="space-y-2 max-h-[300px] overflow-y-auto custom-scrollbar">
                                    <template x-for="ctr in centers" :key="ctr.id || ctr">
                                        <button
                                            type="button"
                                            class="w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 group relative overflow-hidden hover:bg-gradient-to-r hover:from-purple-50 hover:to-purple-100 text-gray-700 hover:shadow-md"
                                            @click="goToCenter(ctr)"
                                        >
                                            <div class="flex items-center">
                                                <div class="w-2 h-2 bg-purple-400 rounded-full mr-3"></div>
                                                <span x-text="ctr.name || ctr" class="font-medium"></span>
                                            </div>
                                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-600"></div>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Footer with stats -->
                        <div class="bg-gray-50/50 px-6 py-4 border-t border-gray-100/50">
                            <div class="flex items-center justify-between text-sm text-gray-600">
                                <div class="flex items-center space-x-4">
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 bg-green-400 rounded-full mr-2"></div>
                                        <span x-text="provinces.length + ' provinces'"></span>
                                    </div>
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 bg-blue-400 rounded-full mr-2"></div>
                                        <span x-text="cities.length + ' villes'"></span>
                                    </div>
                                    <div class="flex items-center">
                                        <div class="w-2 h-2 bg-purple-400 rounded-full mr-2"></div>
                                        <span x-text="centers.length + ' centres'"></span>
                                    </div>
                                </div>
                                <button 
                                    @click="provincesOpen = false; resetSelection()"
                                    class="text-xs text-gray-500 hover:text-gray-700 transition-colors duration-200"
                                >
                                    Fermer
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <a href="#actualites" class="nav-link text-gray-700 hover:text-green-700 font-medium transition-all duration-300">Actualités</a>
                <a href="#contact" class="nav-link text-gray-700 hover:text-green-700 font-medium transition-all duration-300">Contact</a>
                <a
                    href="{% url 'public:login' %}"
                    class="inline-flex items-center gap-2 rounded-full bg-gradient-to-r from-blue-600 to-green-700 text-white font-bold px-5 py-2.5 shadow-lg hover:shadow-xl transition-all duration-300 ease-in-out transform hover:scale-105"
                >
                    <span class="w-2 h-2 rounded-full bg-yellow-300"></span>
                    Espace Admin
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button @click="open = !open" class="md:hidden text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div x-show="open" x-transition class="md:hidden pb-4 space-y-2">
            <a href="#accueil" @click="open = false" class="block text-gray-700 hover:text-green-700 font-medium py-2">Accueil</a>
            <a href="#ministere" @click="open = false" class="block text-gray-700 hover:text-green-700 font-medium py-2">Ministère</a>
            <a href="#ministre" @click="open = false" class="block text-gray-700 hover:text-green-700 font-medium py-2">Le Ministre</a>
            <div class="border border-gray-200 rounded-lg overflow-hidden">
                <button
                    type="button"
                    class="w-full flex items-center justify-between px-3 py-2 text-gray-700 hover:text-green-700 font-medium"
                    @click="toggleProvinces()"
                >
                    <span>Provinces</span>
                    <svg class="w-5 h-5 transition-transform duration-200" :class="provincesOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <div x-show="provincesOpen" x-transition class="px-3 pb-3 space-y-3 bg-gray-50">
                    <div>
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Provinces</p>
                        <div class="grid grid-cols-2 gap-2">
                            <template x-for="p in provinces" :key="p.name">
                                <button
                                    type="button"
                                    class="px-3 py-2 rounded-lg text-sm font-medium text-left"
                                    :class="selectedProvince === p.name ? 'bg-green-100 text-green-800' : 'bg-white text-gray-700'"
                                    @click="selectProvince(p.name)"
                                >
                                    <span x-text="p.name"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Villes</p>
                        <template x-if="!selectedProvince">
                            <p class="text-sm text-gray-500">Choisis une province</p>
                        </template>
                        <div class="grid grid-cols-2 gap-2">
                            <template x-for="c in cities" :key="c.name">
                                <button
                                    type="button"
                                    class="px-3 py-2 rounded-lg text-sm font-medium text-left"
                                    :class="selectedCity === c.name ? 'bg-blue-100 text-blue-800' : 'bg-white text-gray-700'"
                                    @click="selectCity(c.name)"
                                >
                                    <span x-text="c.name"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Centres</p>
                        <template x-if="!selectedCity">
                            <p class="text-sm text-gray-500">Choisis une ville</p>
                        </template>
                        <div class="space-y-2">
                            <template x-for="ctr in centers" :key="ctr">
                                <button
                                    type="button"
                                    class="w-full px-3 py-2 rounded-lg text-sm font-medium text-left bg-white text-gray-700"
                                    @click="goToCenter(ctr); open = false"
                                >
                                    <span x-text="ctr"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
            <a href="#actualites" @click="open = false" class="block text-gray-700 hover:text-green-700 font-medium py-2">Actualités</a>
            <a href="#contact" @click="open = false" class="block text-gray-700 hover:text-green-700 font-medium py-2">Contact</a>
            <a
                href="/admin/login/"
                class="mt-2 inline-flex items-center justify-center w-full rounded-lg bg-gradient-to-r from-blue-600 to-green-700 text-white font-bold py-3 shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-[1.01]"
            >
                Espace Admin
            </a>
        </div>
    </div>
</nav>
