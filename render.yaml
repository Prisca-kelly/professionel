services:
  - type: web
    name: professionel
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn monsite.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: professionel.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: professionel-db
          property: connectionString
    plan: free

databases:
  - name: professionel-db
    databaseName: professionel
    user: professionel
    plan: free
